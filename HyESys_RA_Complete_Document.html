*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Aptos,-apple-system,sans-serif;background:#0E2841;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}

/* Spinner */
.staticrypt-spinner-container{display:flex;align-items:center;justify-content:center;min-height:100vh;position:fixed;inset:0;background:#0E2841;z-index:99}
.staticrypt-spinner{width:48px;height:48px;border:5px solid rgba(255,192,0,.2);border-top-color:#FFC000;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}

/* Card */
.staticrypt-content{width:100%;max-width:420px}
.staticrypt-page{width:100%}
.staticrypt-form{background:#fff;border-radius:12px;padding:36px 40px 32px;box-shadow:0 24px 60px rgba(0,0,0,.45);text-align:center;border-top:5px solid #FFC000}

/* Logo area */
.ast-logo-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:24px}
.ast-logo-row .divider{width:1px;height:32px;background:rgba(14,40,65,.2)}

/* Title */
.staticrypt-title{font-size:17px;font-weight:800;color:#0E2841;margin-bottom:4px;letter-spacing:.2px}
.staticrypt-subtitle{font-size:12px;color:#667085;margin-bottom:0}

.staticrypt-hr{margin:18px 0;border:0;border-top:1px solid #e8edf3}

/* Password input */
.staticrypt-password-container{position:relative;background:#f5f7fa;border:1.5px solid #DDE8F0;border-radius:8px;display:flex;align-items:center;margin-bottom:14px;transition:border-color .2s}
.staticrypt-password-container:focus-within{border-color:#156082}
.staticrypt-password-container input{background:transparent;border:0;outline:0;font-size:14px;padding:13px 44px 13px 14px;width:100%;color:#1a1a2e;font-family:inherit}
.staticrypt-password-container input::placeholder{color:#aab4be}
.staticrypt-toggle-password-visibility{position:absolute;right:12px;width:20px;height:20px;opacity:.4;cursor:pointer;flex-shrink:0}
.staticrypt-toggle-password-visibility:hover{opacity:.7}

/* Remember me */
.staticrypt-remember{display:flex;align-items:center;justify-content:center;gap:7px;font-size:12px;color:#667085;margin-bottom:14px;cursor:pointer}
.staticrypt-remember input[type=checkbox]{accent-color:#156082;width:14px;height:14px;cursor:pointer}

/* Button */
.staticrypt-decrypt-button{width:100%;padding:13px;background:#0E2841;color:#FFC000;border:none;border-radius:8px;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:.4px;transition:background .2s,transform .1s;font-family:inherit}
#staticrypt-decrypt-button:hover{background:#156082}
#staticrypt-decrypt-button:active{transform:scale(.98)}

/* Wrong password */
.staticrypt-invalid-password-container{background:#FFEBEE;border:1px solid #FFCDD2;border-radius:7px;padding:10px 14px;margin-bottom:12px;font-size:12.5px;color:#B71C1C;font-weight:600;text-align:center}

/* Footer note */
.gate-footer{margin-top:18px;font-size:11px;color:rgba(255,255,255,.35);text-align:center}
.gate-footer b{color:rgba(255,192,0,.6)}

@media(max-width:480px){
  .staticrypt-form{padding:28px 22px 24px;border-radius:10px}
  .staticrypt-title{font-size:15px}
}
</style>
